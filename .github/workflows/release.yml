name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: test.db
  SECRET_KEY: ci-test-secret-key-not-for-production

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install Diesel CLI
        run: cargo install diesel_cli --no-default-features --features sqlite

      - name: Check migrations
        run: ci/check-migrations.sh

      - name: Check SSR target
        run: cargo check --features ssr

      - name: Check hydrate target
        run: cargo check --features hydrate --target wasm32-unknown-unknown

      - name: Run tests
        run: cargo test

  build:
    name: Build Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install cargo-leptos
        run: cargo install cargo-leptos

      - name: Build release
        run: cargo leptos build --release

      - name: Package release artifact
        run: |
          mkdir -p dist
          cp target/server/release/webrpg dist/
          cp -r target/site dist/site
          cp -r migrations dist/migrations
          tar czf webrpg-${{ github.ref_name }}-linux-x86_64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webrpg-${{ github.ref_name }}-linux-x86_64
          path: webrpg-${{ github.ref_name }}-linux-x86_64.tar.gz

  smoke:
    name: Smoke Test Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install Diesel CLI
        run: cargo install diesel_cli --no-default-features --features sqlite

      - name: Install cargo-leptos
        run: cargo install cargo-leptos

      - name: Build WASM client
        run: cargo leptos build

      - name: Run smoke test
        run: ci/smoke-test-server.sh

  publish:
    name: Create GitHub Release
    needs: [build, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webrpg-${{ github.ref_name }}-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: webrpg-${{ github.ref_name }}-linux-x86_64.tar.gz
